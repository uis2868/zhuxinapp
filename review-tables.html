<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Zhuxin Review Tables</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap' rel='stylesheet'><style>:root{--shell:#fbfbf9;--surface:#f1efeb;--border:#e6e1d8;--text:#1a1816;--muted:#79726b;--shadow:0 22px 60px rgba(40,35,30,.12);--serif:'Playfair Display',Georgia,serif;--sans:'Inter',system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#edeaf1,#f4f3f0 25%,#f4f3f0);font-family:var(--sans);color:var(--text)}a{text-decoration:none;color:inherit}button,input,select{font:inherit}button{cursor:pointer}.top,.card,.hero{background:var(--shell);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow)}.top{position:sticky;top:0;border-radius:0;box-shadow:none;display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center}.mark{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;background:linear-gradient(180deg,#4b4844,#2e2b28);color:#fff;font-family:var(--serif)}.name{font-family:var(--serif);font-size:28px}.sub{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}.shell{max-width:1180px;margin:0 auto;padding:20px 16px 28px;display:grid;gap:16px}.hero,.card{padding:18px}.hero h1{margin:12px 0 0;font-family:var(--serif);font-size:50px;font-weight:400}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.chip,.btn,.primary,.soft,.danger{padding:8px 12px;border:1px solid var(--border);border-radius:999px;background:#fff;font-size:12px;color:var(--muted)}.btn,.primary,.soft,.danger{border-radius:12px;color:var(--text)}.primary{background:#8e8a86;border-color:#8e8a86;color:#fff}.soft{background:#f7f5f0}.danger{background:#fff5f5;border-color:#efd7d7;color:#8b4040}.small{color:var(--muted);font-size:13px;line-height:1.6}.field{display:grid;gap:6px}.field input,.field select{padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:var(--surface)}.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{padding:10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}.table th{color:var(--muted)}.table input,.table select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:10px;background:var(--surface)}.empty{padding:18px;border:1px dashed var(--border);border-radius:16px;color:var(--muted);background:#fff}.layout{display:grid;gap:16px}@media(min-width:900px){.layout{grid-template-columns:420px minmax(0,1fr)}}</style></head><body><header class='top'><div class='brand'><div class='mark'>Z</div><div><div class='name'>Zhuxin</div><div class='sub'>Review Tables</div></div></div><div class='row'><a class='btn' href='./chamber-dashboard.html'>Chamber</a><a class='btn' href='./verification-queue.html'>Verification Queue</a><a class='btn' href='./dashboard-home.html'>Home</a></div></header><main class='shell'><section class='hero'><div class='row'><span id='matterChip' class='chip'>No current matter</span></div><h1>Review Tables</h1><p class='small'>Track issues, sources, severity, and status in one structured table for the current matter.</p></section><section class='layout'><section class='card'><div class='field'><label class='small'>Table title</label><input id='titleInput' placeholder='Title Chain Issues'></div><div class='field' style='margin-top:10px'><label class='small'>Issue</label><input id='issueInput' placeholder='Missing deed layer'></div><div class='field' style='margin-top:10px'><label class='small'>Source</label><input id='sourceInput' placeholder='Title-chain analysis'></div><div class='field' style='margin-top:10px'><label class='small'>Severity</label><select id='severityInput'><option value='critical'>critical</option><option value='major'>major</option><option value='moderate'>moderate</option><option value='minor'>minor</option></select></div><div class='field' style='margin-top:10px'><label class='small'>Status</label><select id='rowStatusInput'><option value='open'>open</option><option value='reviewing'>reviewing</option><option value='resolved'>resolved</option></select></div><div class='row' style='margin-top:12px'><button class='primary' id='createTableBtn'>Create / Load table</button><button class='soft' id='saveTitleBtn'>Save title</button><button class='soft' id='addRowBtn'>Add row</button><button class='soft' id='verifyBtn'>Send table to verification</button></div><div id='statusText' class='small' style='margin-top:10px'></div></section><section class='card'><div class='row' style='justify-content:space-between'><h2 style='margin:0;font-family:var(--serif);font-weight:400'>Current table</h2><button class='btn' id='refreshBtn'>Refresh</button></div><div id='tableBox' style='margin-top:14px'></div></section></section></main><script type='module'>import { getCurrentMatterFromMirror } from './app-data.js'; import { createReviewTable, listReviewTables, addReviewTableRow, createReviewVerificationRequest, updateReviewTableRow, deleteReviewTableRow, updateReviewTable } from './legal-workflow-data.js'; let currentTable=null; function renderHeader(){const matter=getCurrentMatterFromMirror();document.getElementById('matterChip').textContent=matter?matter.name:'No current matter';return matter;} function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))} function renderTable(){const box=document.getElementById('tableBox'); if(!currentTable){box.innerHTML='<div class="empty">No review table loaded yet.</div>'; return;} const rows=currentTable.rows||[]; if(!rows.length){box.innerHTML='<div class="empty">No rows added yet.</div>'; return;} box.innerHTML='<table class="table"><thead><tr><th>Issue</th><th>Source</th><th>Severity</th><th>Status</th><th>Actions</th></tr></thead><tbody>'+rows.map(r=>'<tr data-row="'+r.id+'"><td><input data-field="issue" value="'+esc(r.issue)+'"></td><td><input data-field="source" value="'+esc(r.source)+'"></td><td><select data-field="severity"><option value="critical" '+(r.severity==='critical'?'selected':'')+'>critical</option><option value="major" '+(r.severity==='major'?'selected':'')+'>major</option><option value="moderate" '+(r.severity==='moderate'?'selected':'')+'>moderate</option><option value="minor" '+(r.severity==='minor'?'selected':'')+'>minor</option></select></td><td><select data-field="status"><option value="open" '+(r.status==='open'?'selected':'')+'>open</option><option value="reviewing" '+(r.status==='reviewing'?'selected':'')+'>reviewing</option><option value="resolved" '+(r.status==='resolved'?'selected':'')+'>resolved</option></select></td><td><div class="row"><button class="soft" data-save-row="'+r.id+'">Save</button><button class="danger" data-delete-row="'+r.id+'">Delete</button></div></td></tr>').join('')+'</tbody></table>'; } async function loadLatest(){const matter=renderHeader(); const tables=listReviewTables(matter?.id||null); currentTable=tables[0]||null; if(currentTable) document.getElementById('titleInput').value=currentTable.title||''; renderTable(); } document.getElementById('createTableBtn').addEventListener('click',async()=>{const matter=renderHeader(); if(!matter){document.getElementById('statusText').textContent='Select a current matter first.'; return;} const existing=listReviewTables(matter.id)[0]; if(existing){currentTable=existing; document.getElementById('statusText').textContent='Loaded latest review table.'; renderTable(); return;} currentTable=await createReviewTable({title:document.getElementById('titleInput').value.trim()||'Review Table', matterId:matter.id, rows:[]}); document.getElementById('statusText').textContent='Review table created.'; renderTable();}); document.getElementById('saveTitleBtn').addEventListener('click',async()=>{ if(!currentTable){document.getElementById('statusText').textContent='Create or load a review table first.'; return;} currentTable=await updateReviewTable(currentTable.id,{title:document.getElementById('titleInput').value.trim()||currentTable.title}); document.getElementById('statusText').textContent='Table title updated.'; }); document.getElementById('addRowBtn').addEventListener('click',async()=>{ try{ if(!currentTable){document.getElementById('statusText').textContent='Create or load a review table first.'; return;} const issue=document.getElementById('issueInput').value.trim(); const source=document.getElementById('sourceInput').value.trim(); if(!issue||!source){document.getElementById('statusText').textContent='Add issue and source first.'; return;} currentTable=await addReviewTableRow(currentTable.id,{issue,source,severity:document.getElementById('severityInput').value,status:document.getElementById('rowStatusInput').value}); document.getElementById('statusText').textContent='Row added and saved.'; renderTable(); }catch(err){ document.getElementById('statusText').textContent=err.message||'Unable to add row.'; }}); document.getElementById('tableBox').addEventListener('click',async e=>{ if(!currentTable) return; const saveBtn=e.target.closest('button[data-save-row]'); const deleteBtn=e.target.closest('button[data-delete-row]'); if(saveBtn){ const rowId=saveBtn.dataset.saveRow; const rowEl=saveBtn.closest('tr'); const issue=rowEl.querySelector('input[data-field="issue"]').value.trim(); const source=rowEl.querySelector('input[data-field="source"]').value.trim(); const severity=rowEl.querySelector('select[data-field="severity"]').value; const status=rowEl.querySelector('select[data-field="status"]').value; currentTable=await updateReviewTableRow(currentTable.id,rowId,{issue,source,severity,status}); document.getElementById('statusText').textContent='Row updated.'; renderTable(); } if(deleteBtn){ const rowId=deleteBtn.dataset.deleteRow; currentTable=await deleteReviewTableRow(currentTable.id,rowId); document.getElementById('statusText').textContent='Row deleted.'; renderTable(); } }); document.getElementById('verifyBtn').addEventListener('click',async()=>{ try{ if(!currentTable){document.getElementById('statusText').textContent='Create or load a review table first.'; return;} await createReviewVerificationRequest(currentTable.id); document.getElementById('statusText').textContent='Verification request created for this review table.'; }catch(err){ document.getElementById('statusText').textContent=err.message||'Unable to send review table to verification.'; }}); document.getElementById('refreshBtn').addEventListener('click',loadLatest); window.addEventListener('storage',loadLatest); loadLatest();</script></body></html>
