<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Zhuxin Settings</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap' rel='stylesheet'><style>:root{--bg:#f4f3f0;--shell:#fbfbf9;--surface:#f1efeb;--border:#e6e1d8;--text:#1a1816;--muted:#79726b;--shadow:0 22px 60px rgba(40,35,30,.12);--serif:'Playfair Display',Georgia,serif;--sans:'Inter',system-ui,sans-serif}*{box-sizing:border-box}html,body{margin:0;padding:0;background:linear-gradient(180deg,#edeaf1,#f4f3f0 25%,#f4f3f0);color:var(--text);font-family:var(--sans)}a{text-decoration:none;color:inherit}button,input,select{font:inherit}button{cursor:pointer}.top{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px;background:rgba(251,251,249,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}.brand{display:flex;align-items:center;gap:10px}.mark{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-family:var(--serif);font-weight:500;letter-spacing:-.04em;color:#fff;background:linear-gradient(180deg,#4b4844,#2e2b28)}.name{font-family:var(--serif);font-size:28px;line-height:1}.sub{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}.row,.chips{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.btn,.primary{border-radius:12px;padding:10px 14px;border:1px solid var(--border);background:#fff;color:var(--text)}.primary{background:#8e8a86;border-color:#8e8a86;color:#fff}.chip{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border:1px solid var(--border);border-radius:999px;background:#fff;font-size:12px;color:var(--muted)}.shell{max-width:1100px;margin:0 auto;padding:20px 16px 28px;display:grid;gap:16px}.hero,.card{background:var(--shell);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);padding:18px}.hero h1{margin:12px 0 0;font-family:var(--serif);font-size:48px;font-weight:400;letter-spacing:-.02em}.desc,.meta{color:var(--muted);font-size:13px;line-height:1.65}.grid{display:grid;gap:16px}.field{display:grid;gap:6px}.field span{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}.field input,.field select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:var(--surface);color:var(--text);outline:none}@media(min-width:900px){.grid{grid-template-columns:1fr 1fr}}</style><script src='./supabase-config.js'></script></head><body><header class='top'><div class='brand'><div class='mark'>Z</div><div><div class='name'>Zhuxin</div><div class='sub'>Settings</div></div></div><div class='row'><span id='modeChip' class='chip'>Local mode</span><a class='btn' href='./history.html'>History</a><a class='btn' href='./index.html'>Dashboard</a></div></header><main class='shell'><section class='hero'><div class='chips'><span class='chip'>App settings</span><span class='chip'>Shared preferences</span></div><h1>Settings</h1><div class='desc'>These settings are saved through the shared app-data layer. In local mode they stay in browser storage; in Supabase mode they are stored in the database.</div></section><section class='card'><div class='grid'><label class='field'><span>Theme</span><select id='themeSelect'><option value='light-harvey'>Light Harvey-style</option></select></label><label class='field'><span>Locale</span><select id='localeSelect'><option value='en'>English</option><option value='bn'>Bangla</option></select></label><label class='field'><span>Default response style</span><select id='responseStyle'><option value='structured'>Structured</option><option value='concise'>Concise</option><option value='formal'>Formal</option></select></label><label class='field'><span>Default notice response days</span><input id='noticeDays' placeholder='7'></label></div><div class='row' style='margin-top:16px'><button class='primary' id='saveBtn'>Save settings</button><button class='btn' id='refreshBtn'>Refresh</button></div><div id='statusText' class='meta' style='margin-top:14px'>Waiting for current settings...</div></section></main><script type='module'>import { getAuthSummary, getAppSettings, saveAppSettings } from './app-data.js'; const ids={modeChip:document.getElementById('modeChip'),themeSelect:document.getElementById('themeSelect'),localeSelect:document.getElementById('localeSelect'),responseStyle:document.getElementById('responseStyle'),noticeDays:document.getElementById('noticeDays'),statusText:document.getElementById('statusText')}; async function renderSettings(){ const auth=await getAuthSummary(); ids.modeChip.textContent=auth.mode==='supabase'?'Supabase mode':'Local mode'; const settings=await getAppSettings(); ids.themeSelect.value=settings.theme||'light-harvey'; ids.localeSelect.value=settings.locale||'en'; ids.responseStyle.value=settings.preferences?.responseStyle||'structured'; ids.noticeDays.value=settings.preferences?.noticeDays||'7'; ids.statusText.textContent='Loaded settings for '+(auth.displayName||'current user')+'.'; } document.getElementById('saveBtn').addEventListener('click',async()=>{ try{ await saveAppSettings({ theme: ids.themeSelect.value, locale: ids.localeSelect.value, preferences: { responseStyle: ids.responseStyle.value, noticeDays: ids.noticeDays.value.trim()||'7' } }); ids.statusText.textContent='Settings saved.'; }catch(error){ ids.statusText.textContent=error.message||'Unable to save settings.'; } }); document.getElementById('refreshBtn').addEventListener('click',renderSettings); window.addEventListener('storage',renderSettings); renderSettings();</script></body></html>
