<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Zhuxin Inside Assistant</title><style>html,body{margin:0;height:100%;background:#111}iframe{width:100%;height:100%;border:0}</style></head><body><iframe id='frame' src='./inside-suite.html'></iframe><script>const frame=document.getElementById('frame');function syncTab(){const w=frame.contentWindow;if(!w)return;try{if(window.innerWidth<1100&&w.showMobile){w.showMobile('assistant')}else if(w.showPage){w.showPage('assistant')}}catch(e){}}frame.addEventListener('load',()=>setTimeout(syncTab,180));window.addEventListener('resize',()=>setTimeout(syncTab,120));</script></body></html>
