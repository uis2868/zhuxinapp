<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Zhuxin Inheritance</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap' rel='stylesheet'><style>:root{--shell:#fbfbf9;--surface:#f1efeb;--border:#e6e1d8;--text:#1a1816;--muted:#79726b;--shadow:0 22px 60px rgba(40,35,30,.12);--serif:'Playfair Display',Georgia,serif;--sans:'Inter',system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#edeaf1,#f4f3f0 25%,#f4f3f0);font-family:var(--sans);color:var(--text)}a{text-decoration:none;color:inherit}button,input{font:inherit}button{cursor:pointer}.top,.card,.hero{background:var(--shell);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow)}.top{position:sticky;top:0;border-radius:0;box-shadow:none;display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center}.mark{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;background:linear-gradient(180deg,#4b4844,#2e2b28);color:#fff;font-family:var(--serif)}.name{font-family:var(--serif);font-size:28px}.sub{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}.shell{max-width:1180px;margin:0 auto;padding:20px 16px 28px;display:grid;gap:16px}.hero,.card{padding:18px}.hero h1{margin:12px 0 0;font-family:var(--serif);font-size:50px;font-weight:400}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.chip,.btn,.primary{padding:8px 12px;border:1px solid var(--border);border-radius:999px;background:#fff;font-size:12px;color:var(--muted)}.btn,.primary{border-radius:12px;color:var(--text)}.primary{background:#8e8a86;border-color:#8e8a86;color:#fff}.grid{display:grid;gap:16px}@media(min-width:900px){.grid{grid-template-columns:420px minmax(0,1fr)}}input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:var(--surface);outline:none}.field{display:grid;gap:6px}.field span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.meta,.small{color:var(--muted);font-size:13px;line-height:1.6}.empty{padding:18px;border:1px dashed var(--border);border-radius:16px;color:var(--muted);background:#fff}</style></head><body><header class='top'><div class='brand'><div class='mark'>Z</div><div><div class='name'>Zhuxin</div><div class='sub'>Inheritance</div></div></div><div class='row'><a class='btn' href='./history.html'>History</a><a class='btn' href='./dashboard-home.html'>Home</a></div></header><main class='shell'><section class='hero'><div class='row'><span id='matterChip' class='chip'>No current matter</span></div><h1>Inheritance</h1><p class='meta'>Guided inheritance workflow with a strong disclaimer and advocate review path.</p></section><section class='grid'><section class='card'><div class='field'><span>Deceased name</span><input id='deceasedName'></div><div class='field' style='margin-top:10px'><span>Wives</span><input id='wives' value='0'></div><div class='field' style='margin-top:10px'><span>Sons</span><input id='sons' value='0'></div><div class='field' style='margin-top:10px'><span>Daughters</span><input id='daughters' value='0'></div><div class='row' style='margin-top:10px'><label><input id='husband' type='checkbox'> Husband present</label><label><input id='father' type='checkbox'> Father present</label><label><input id='mother' type='checkbox'> Mother present</label></div><div class='row' style='margin-top:12px'><button class='primary' id='runBtn'>Calculate</button><a class='btn' href='./verification-queue.html'>Verification Queue</a></div><div id='statusText' class='small' style='margin-top:10px'></div></section><section class='card'><h2 style='margin:0 0 12px;font-family:var(--serif);font-weight:400'>Latest result</h2><div id='resultBox' class='empty'>No inheritance result generated yet.</div></section></section></main><script type='module'>import { getCurrentMatterFromMirror } from './app-data.js'; import { createInheritanceCalculation } from './legal-workflow-data.js'; function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))} function renderHeader(){ const matter=getCurrentMatterFromMirror(); document.getElementById('matterChip').textContent=matter?matter.name:'No current matter'; } document.getElementById('runBtn').addEventListener('click',async()=>{ try{ const out=await createInheritanceCalculation({ deceasedName:document.getElementById('deceasedName').value.trim(), wives:document.getElementById('wives').value, sons:document.getElementById('sons').value, daughters:document.getElementById('daughters').value, husband:document.getElementById('husband').checked, father:document.getElementById('father').checked, mother:document.getElementById('mother').checked }); document.getElementById('resultBox').className=''; document.getElementById('resultBox').innerHTML='<pre style="white-space:pre-wrap;margin:0;font-family:inherit;line-height:1.75">'+esc(out.document.content)+'</pre>'; document.getElementById('statusText').textContent='Inheritance result generated and saved.'; }catch(err){ document.getElementById('statusText').textContent=err.message||'Failed to generate inheritance result.'; } }); renderHeader();</script></body></html>
