<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Zhuxin Inheritance</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap' rel='stylesheet'><style>:root{--shell:#fbfbf9;--surface:#f1efeb;--border:#e6e1d8;--text:#1a1816;--muted:#79726b;--shadow:0 22px 60px rgba(40,35,30,.12);--serif:'Playfair Display',Georgia,serif;--sans:'Inter',system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#edeaf1,#f4f3f0 25%,#f4f3f0);font-family:var(--sans);color:var(--text)}a{text-decoration:none;color:inherit}button,input{font:inherit}button{cursor:pointer}.top,.card,.hero,.mini{background:var(--shell);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow)}.top{position:sticky;top:0;border-radius:0;box-shadow:none;display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center}.mark{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;background:linear-gradient(180deg,#4b4844,#2e2b28);color:#fff;font-family:var(--serif)}.name{font-family:var(--serif);font-size:28px}.sub{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}.shell{max-width:1180px;margin:0 auto;padding:20px 16px 28px;display:grid;gap:16px}.hero,.card,.mini{padding:18px}.hero h1{margin:12px 0 0;font-family:var(--serif);font-size:50px;font-weight:400}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.chip,.btn,.primary,.soft{padding:8px 12px;border:1px solid var(--border);border-radius:999px;background:#fff;font-size:12px;color:var(--muted)}.btn,.primary,.soft{border-radius:12px;color:var(--text)}.primary{background:#8e8a86;border-color:#8e8a86;color:#fff}.soft{background:#f7f5f0}.grid{display:grid;gap:16px}@media(min-width:900px){.grid{grid-template-columns:420px minmax(0,1fr)}}input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:var(--surface);outline:none}.field{display:grid;gap:6px}.field span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.meta,.small{color:var(--muted);font-size:13px;line-height:1.6}.cards{display:grid;gap:12px}@media(min-width:900px){.cards{grid-template-columns:repeat(3,minmax(0,1fr))}}.resultbox{display:grid;gap:12px}.result-title{margin:0;font-family:var(--serif);font-weight:400;font-size:28px}.empty{padding:18px;border:1px dashed var(--border);border-radius:16px;color:var(--muted);background:#fff}.listline{margin:0;color:var(--muted);font-size:13px;line-height:1.7}.warn{background:#fff8f2}.ok{background:#f8faf7}</style></head><body><header class='top'><div class='brand'><div class='mark'>Z</div><div><div class='name'>Zhuxin</div><div class='sub'>Inheritance</div></div></div><div class='row'><a class='btn' href='./history.html'>History</a><a class='btn' href='./verification-queue.html'>Verification Queue</a><a class='btn' href='./dashboard-home.html'>Home</a></div></header><main class='shell'><section class='hero'><div class='row'><span id='matterChip' class='chip'>No current matter</span></div><h1>Inheritance</h1><p class='meta'>Simple inheritance calculator with explanation, warnings, and a direct advocate-verification path.</p></section><section class='grid'><section class='card'><div class='row' style='margin-bottom:12px'><button class='soft' data-preset='wife-sons-daughters'>Example: wife + sons + daughters</button><button class='soft' data-preset='husband-daughters'>Example: husband + daughters</button></div><div class='field'><span>Deceased name</span><input id='deceasedName' placeholder='Name of deceased'></div><div class='field' style='margin-top:10px'><span>Wives</span><input id='wives' value='0'></div><div class='field' style='margin-top:10px'><span>Sons</span><input id='sons' value='0'></div><div class='field' style='margin-top:10px'><span>Daughters</span><input id='daughters' value='0'></div><div class='row' style='margin-top:10px'><label><input id='husband' type='checkbox'> Husband present</label><label><input id='father' type='checkbox'> Father present</label><label><input id='mother' type='checkbox'> Mother present</label></div><div class='row' style='margin-top:12px'><button class='primary' id='runBtn'>Calculate inheritance</button><button class='soft' id='verifyBtn'>Send to verification</button><a class='soft' href='./verification-queue.html'>Open Verification Queue</a></div><div id='statusText' class='small' style='margin-top:10px'></div></section><section class='card'><h2 class='result-title'>Latest result</h2><div id='resultBox' class='resultbox' style='margin-top:12px'><div class='empty'>No inheritance result generated yet.</div></div></section></section></main><script type='module'>import { getCurrentMatterFromMirror } from './app-data.js'; import { createInheritanceCalculation, createVerificationRequest, listInheritanceCalculations } from './legal-workflow-data.js'; let latestRun=null; function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))} function renderHeader(){ const matter=getCurrentMatterFromMirror(); document.getElementById('matterChip').textContent=matter?matter.name:'No current matter'; return matter; } function applyPreset(key){ if(key==='wife-sons-daughters'){ document.getElementById('wives').value='1'; document.getElementById('sons').value='2'; document.getElementById('daughters').value='1'; document.getElementById('husband').checked=false; document.getElementById('father').checked=false; document.getElementById('mother').checked=true; } if(key==='husband-daughters'){ document.getElementById('wives').value='0'; document.getElementById('sons').value='0'; document.getElementById('daughters').value='2'; document.getElementById('husband').checked=true; document.getElementById('father').checked=false; document.getElementById('mother').checked=true; } } function shareLines(run){ return (run.shares||[]).map(s=>'<p class="listline">• '+esc(s.label)+': '+esc(s.share)+'</p>').join(''); } function warningLines(run){ return (run.warnings||[]).length ? (run.warnings||[]).map(s=>'<p class="listline">• '+esc(s)+'</p>').join('') : '<p class="listline">• No immediate warning detected from the current input.</p>'; } function explanationLines(run){ return (run.explanations||[]).map(s=>'<p class="listline">• '+esc(s)+'</p>').join(''); } function recommendationLines(run){ return (run.recommendations||[]).map(s=>'<p class="listline">• '+esc(s)+'</p>').join(''); } function renderRun(run){ const box=document.getElementById('resultBox'); if(!run){ box.innerHTML='<div class="empty">No inheritance result generated yet.</div>'; return; } box.innerHTML='<div class="cards"><div class="mini ok"><div class="small">Quick summary</div><div style="margin-top:8px">'+esc(run.quickSummary||'No summary')+'</div></div><div class="mini"><div class="small">Heir input</div><div style="margin-top:8px" class="listline">Wives: '+esc(String(run.input.wives))+' · Sons: '+esc(String(run.input.sons))+' · Daughters: '+esc(String(run.input.daughters))+'</div><div class="listline">Husband: '+(run.input.husband?'Yes':'No')+' · Father: '+(run.input.father?'Yes':'No')+' · Mother: '+(run.input.mother?'Yes':'No')+'</div></div><div class="mini warn"><div class="small">Disclaimer</div><div style="margin-top:8px" class="listline">If the facts entered are true and complete, this is the likely inheritance position. Complex situations should be verified by an advocate.</div></div></div><div class="mini"><div class="small">Indicative shares</div><div style="margin-top:8px">'+shareLines(run)+'</div></div><div class="mini"><div class="small">Explanation</div><div style="margin-top:8px">'+explanationLines(run)+'</div></div><div class="mini warn"><div class="small">Warnings</div><div style="margin-top:8px">'+warningLines(run)+'</div></div><div class="mini"><div class="small">Recommendations</div><div style="margin-top:8px">'+recommendationLines(run)+'</div></div><div class="row"><button class="soft" id="useLatestForVerification">Send latest result to verification</button>'+(run.documentId?'<a class="soft" href="./governed-export.html?doc='+run.documentId+'">Open latest result in Governed Export</a>':'')+'</div>'; const verifyBtn=document.getElementById('useLatestForVerification'); if(verifyBtn){ verifyBtn.addEventListener('click',sendLatestToVerification); } } async function loadLatestSaved(){ const matter=renderHeader(); const runs=listInheritanceCalculations(matter?.id||null); latestRun=runs[0]||null; renderRun(latestRun); } async function sendLatestToVerification(){ try{ const matter=renderHeader(); if(!latestRun){ document.getElementById('statusText').textContent='Calculate inheritance first.'; return; } await createVerificationRequest({ matterId: matter?.id||latestRun.matterId||null, title: 'Inheritance verification', sourceModule: 'inheritance', sourceDocumentId: latestRun.documentId, note: 'Inheritance workflow result sent for advocate review.' }); document.getElementById('statusText').textContent='Inheritance result sent to verification queue.'; }catch(err){ document.getElementById('statusText').textContent=err.message||'Failed to send inheritance result to verification.'; } } document.querySelectorAll('[data-preset]').forEach(btn=>btn.addEventListener('click',()=>applyPreset(btn.dataset.preset))); document.getElementById('runBtn').addEventListener('click',async()=>{ try{ const out=await createInheritanceCalculation({ deceasedName:document.getElementById('deceasedName').value.trim(), wives:document.getElementById('wives').value, sons:document.getElementById('sons').value, daughters:document.getElementById('daughters').value, husband:document.getElementById('husband').checked, father:document.getElementById('father').checked, mother:document.getElementById('mother').checked }); latestRun=out.run; renderRun(latestRun); document.getElementById('statusText').textContent='Inheritance result generated and saved.'; }catch(err){ document.getElementById('statusText').textContent=err.message||'Failed to generate inheritance result.'; } }); document.getElementById('verifyBtn').addEventListener('click',sendLatestToVerification); window.addEventListener('storage',loadLatestSaved); loadLatestSaved();</script></body></html>
