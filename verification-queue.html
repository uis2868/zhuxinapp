<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Zhuxin Verification Queue</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap' rel='stylesheet'><style>:root{--shell:#fbfbf9;--border:#e6e1d8;--text:#1a1816;--muted:#79726b;--shadow:0 22px 60px rgba(40,35,30,.12);--serif:'Playfair Display',Georgia,serif;--sans:'Inter',system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#edeaf1,#f4f3f0 25%,#f4f3f0);font-family:var(--sans);color:var(--text)}a{text-decoration:none;color:inherit}button,input{font:inherit}button{cursor:pointer}.top,.card,.hero,.item{background:var(--shell);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow)}.top{position:sticky;top:0;border-radius:0;box-shadow:none;display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center}.mark{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;background:linear-gradient(180deg,#4b4844,#2e2b28);color:#fff;font-family:var(--serif)}.name{font-family:var(--serif);font-size:28px}.sub{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}.shell{max-width:1180px;margin:0 auto;padding:20px 16px 28px;display:grid;gap:16px}.hero,.card,.item{padding:18px}.hero h1{margin:12px 0 0;font-family:var(--serif);font-size:50px;font-weight:400}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.chip,.btn,.primary{padding:8px 12px;border:1px solid var(--border);border-radius:999px;background:#fff;font-size:12px;color:var(--muted)}.btn,.primary{border-radius:12px;color:var(--text)}.primary{background:#8e8a86;border-color:#8e8a86;color:#fff}.list{display:grid;gap:12px}.small{color:var(--muted);font-size:13px;line-height:1.6}.empty{padding:18px;border:1px dashed var(--border);border-radius:16px;color:var(--muted);background:#fff}</style></head><body><header class='top'><div class='brand'><div class='mark'>Z</div><div><div class='name'>Zhuxin</div><div class='sub'>Verification queue</div></div></div><div class='row'><a class='btn' href='./dashboard-home.html'>Home</a><a class='btn' href='./history.html'>History</a></div></header><main class='shell'><section class='hero'><div class='row'><span id='matterChip' class='chip'>No current matter</span></div><h1>Verification Queue</h1><p class='small'>Track system-generated outputs that need advocate review and move them through governed statuses.</p></section><section class='card'><div class='row' style='justify-content:space-between'><h2 style='margin:0;font-family:var(--serif);font-weight:400'>Requests</h2><button class='btn' id='refreshBtn'>Refresh</button></div><div id='queueList' class='list' style='margin-top:14px'></div></section></main><script type='module'>import { getCurrentMatterFromMirror } from './app-data.js'; import { listVerificationRequests, updateVerificationRequest } from './legal-workflow-data.js'; function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))} function renderHeader(){const matter=getCurrentMatterFromMirror();document.getElementById('matterChip').textContent=matter?matter.name:'No current matter';return matter;} function renderQueue(){const matter=renderHeader();const items=listVerificationRequests(matter?.id||null);const box=document.getElementById('queueList');box.innerHTML='';if(!items.length){box.innerHTML='<div class="empty">No verification requests yet.</div>';return;}items.forEach(r=>{const div=document.createElement('div');div.className='item';div.innerHTML='<h3 style="margin:0 0 8px;font-size:18px">'+esc(r.title)+'</h3><div class="small">'+esc(r.sourceModule)+' · '+esc(r.status)+' · '+esc(new Date(r.createdAt).toLocaleString('en-GB'))+'</div><div class="small" style="margin-top:8px">'+esc(r.note||'No note')+'</div><div class="row" style="margin-top:12px"><button class="btn" data-id="'+r.id+'" data-status="under advocate review">Mark under review</button><button class="btn" data-id="'+r.id+'" data-status="verified by advocate">Verify</button><button class="btn" data-id="'+r.id+'" data-status="verification rejected">Reject</button></div>';box.appendChild(div);});} document.getElementById('queueList').addEventListener('click',async e=>{const b=e.target.closest('button[data-id]');if(!b)return;await updateVerificationRequest(b.dataset.id,{status:b.dataset.status});renderQueue();});document.getElementById('refreshBtn').addEventListener('click',renderQueue);window.addEventListener('storage',renderQueue);renderQueue();</script></body></html>
