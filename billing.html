<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Zhuxin Billing</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap' rel='stylesheet'><style>:root{--shell:#fbfbf9;--border:#e6e1d8;--text:#1a1816;--muted:#79726b;--shadow:0 22px 60px rgba(40,35,30,.12);--serif:'Playfair Display',Georgia,serif;--sans:'Inter',system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#edeaf1,#f4f3f0 25%,#f4f3f0);font-family:var(--sans);color:var(--text)}a{text-decoration:none;color:inherit}button,select{font:inherit}button{cursor:pointer}.top,.card,.hero,.plan{background:var(--shell);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow)}.top{position:sticky;top:0;border-radius:0;box-shadow:none;display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center}.mark{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;background:linear-gradient(180deg,#4b4844,#2e2b28);color:#fff;font-family:var(--serif)}.name{font-family:var(--serif);font-size:28px}.sub{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}.shell{max-width:1180px;margin:0 auto;padding:20px 16px 28px;display:grid;gap:16px}.hero,.card,.plan{padding:18px}.hero h1{margin:12px 0 0;font-family:var(--serif);font-size:50px;font-weight:400}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.chip,.btn,.primary{padding:8px 12px;border:1px solid var(--border);border-radius:999px;background:#fff;font-size:12px;color:var(--muted)}.btn,.primary{border-radius:12px;color:var(--text)}.primary{background:#8e8a86;border-color:#8e8a86;color:#fff}.grid{display:grid;gap:16px}@media(min-width:900px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}.plan h3{margin:0 0 6px}.small{color:var(--muted);font-size:13px;line-height:1.6}select{padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:#fff}</style></head><body><header class='top'><div class='brand'><div class='mark'>Z</div><div><div class='name'>Zhuxin</div><div class='sub'>Billing</div></div></div><div class='row'><a class='btn' href='./dashboard-home.html'>Home</a><a class='btn' href='./settings.html'>Settings</a></div></header><main class='shell'><section class='hero'><div class='row'><span id='roleChip' class='chip'>Role</span><span id='planChip' class='chip'>Plan</span></div><h1>Billing & Plans</h1><p class='small'>Select a plan, review pricing, and see the supported payment channels.</p></section><section class='card'><label class='small' for='planSelect'>Change current plan</label><div class='row' style='margin-top:10px'><select id='planSelect'></select><button class='primary' id='savePlanBtn'>Save plan</button></div><div id='statusText' class='small' style='margin-top:10px'></div></section><section id='plansGrid' class='grid'></section></main><script type='module'>import { getCurrentAccessProfile, getPlanCatalog, getBillingSummary, changeCurrentPlan } from './access-data.js'; async function render(){ const access=await getCurrentAccessProfile(); const summary=await getBillingSummary(); document.getElementById('roleChip').textContent=access.role; document.getElementById('planChip').textContent=summary.plan.label; const select=document.getElementById('planSelect'); const plans=getPlanCatalog(); select.innerHTML=''; Object.values(plans).forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.label+' — '+p.priceBdt+' BDT'; if(p.id===access.planId)o.selected=true; select.appendChild(o);}); const grid=document.getElementById('plansGrid'); grid.innerHTML=''; Object.values(plans).forEach(p=>{const div=document.createElement('div');div.className='plan';div.innerHTML='<h3>'+p.label+'</h3><div class="small">Price: '+p.priceBdt+' BDT</div><div class="small">Quota: '+p.quota+'</div><div class="small">Role tier: '+p.role+'</div><div class="small" style="margin-top:8px">Payments: '+summary.paymentOptions.join(', ')+'</div>'; grid.appendChild(div);}); } document.getElementById('savePlanBtn').addEventListener('click',async()=>{ await changeCurrentPlan(document.getElementById('planSelect').value); document.getElementById('statusText').textContent='Plan updated.'; render();}); window.addEventListener('storage',render); render();</script></body></html>
