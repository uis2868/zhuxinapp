<script>
window.onload = function () {

  alert("JS LOADED");

  const sendBtn = document.getElementById("sendBtn");
  const promptBox = document.getElementById("promptBox");
  const messages = document.getElementById("messages");
  const threadList = document.getElementById("threadList");

  // 🚨 SAFETY CHECK (CRITICAL)
  if (!sendBtn || !promptBox || !messages || !threadList) {
    alert("ELEMENT MISSING → CHECK HTML IDS");
    return;
  }

  let currentAnswer = "";

  function loadThreads() {
    try {
      return JSON.parse(localStorage.getItem("zhx_threads") || "[]");
    } catch {
      return [];
    }
  }

  function saveThreads(t) {
    localStorage.setItem("zhx_threads", JSON.stringify(t));
  }

  function render() {
    messages.innerHTML = currentAnswer
      ? "<div>✅ " + currentAnswer + "</div>"
      : "<div>No output yet.</div>";

    const threads = loadThreads();
    threadList.innerHTML = "";

    threads.forEach(t => {
      const div = document.createElement("div");
      div.textContent = t.title;

      div.onclick = () => {
        currentAnswer = t.answer;
        render();
      };

      threadList.appendChild(div);
    });
  }

  sendBtn.onclick = function () {
    alert("CLICK WORKED");

    const prompt = promptBox.value.trim();
    if (!prompt) return;

    currentAnswer = "WORKING OUTPUT → " + prompt;

    const threads = loadThreads();
    threads.unshift({
      title: prompt,
      answer: currentAnswer
    });

    saveThreads(threads);
    render();
  };

  render();
};
</script>
