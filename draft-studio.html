<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Zhuxin Draft Studio</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap' rel='stylesheet'><style>:root{--shell:#fbfbf9;--surface:#f1efeb;--border:#e6e1d8;--text:#1a1816;--muted:#79726b;--shadow:0 22px 60px rgba(40,35,30,.12);--serif:'Playfair Display',Georgia,serif;--sans:'Inter',system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#edeaf1,#f4f3f0 25%,#f4f3f0);font-family:var(--sans);color:var(--text)}a{text-decoration:none;color:inherit}button,textarea,select{font:inherit}button{cursor:pointer}.top,.hero,.card{background:var(--shell);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow)}.top{position:sticky;top:0;border-radius:0;box-shadow:none;display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center}.mark{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;background:linear-gradient(180deg,#4b4844,#2e2b28);color:#fff;font-family:var(--serif)}.name{font-family:var(--serif);font-size:28px}.sub{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}.shell{max-width:1180px;margin:0 auto;padding:20px 16px 28px;display:grid;gap:16px}.hero,.card{padding:18px}.hero h1{margin:12px 0 0;font-family:var(--serif);font-size:50px;font-weight:400}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.chip,.btn,.primary,.soft{padding:8px 12px;border:1px solid var(--border);border-radius:999px;background:#fff;font-size:12px;color:var(--muted)}.btn,.primary,.soft{border-radius:12px;color:var(--text)}.primary{background:#8e8a86;border-color:#8e8a86;color:#fff}.soft{background:#f7f5f0}.small{color:var(--muted);font-size:13px;line-height:1.6}textarea,select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:var(--surface);outline:none}.grid{display:grid;gap:16px}@media(min-width:900px){.grid{grid-template-columns:380px minmax(0,1fr)}}.empty{padding:18px;border:1px dashed var(--border);border-radius:16px;color:var(--muted);background:#fff}.locked{background:#fff8f2}</style></head><body><header class='top'><div class='brand'><div class='mark'>Z</div><div><div class='name'>Zhuxin</div><div class='sub'>Draft Studio</div></div></div><div class='row'><a class='btn' href='./chamber-dashboard.html'>Chamber</a><a class='btn' href='./history.html'>History</a><a class='btn' href='./governed-export.html'>Governed Export</a></div></header><main class='shell'><section class='hero'><div class='row'><span id='matterChip' class='chip'>No current matter</span><span id='roleChip' class='chip'>Role</span></div><h1>Draft Studio</h1><p class='small'>Professional draft workspace for chamber users by matter class, now connected to verification and governed export.</p></section><section id='restrictionBox' class='card locked' style='display:none'><h2 style='margin:0 0 10px;font-family:var(--serif);font-weight:400'>Restricted page</h2><div id='restrictionText' class='small'></div></section><section id='workGrid' class='grid'><section class='card'><label class='small'>Matter class</label><select id='classSelect'><option>civil/property</option><option>criminal</option><option>family</option><option>corporate</option></select><label class='small' style='margin-top:10px;display:block'>Instructions</label><textarea id='instructionsBox' placeholder='Describe the draft you want to prepare.'></textarea><div class='row' style='margin-top:12px'><button class='primary' id='createBtn'>Create draft</button><button class='soft' id='verifyBtn'>Send to verification</button></div><div id='statusText' class='small' style='margin-top:10px'></div></section><section class='card'><h2 style='margin:0 0 12px;font-family:var(--serif);font-weight:400'>Latest draft</h2><div id='draftBox' class='empty'>No draft created yet.</div></section></section></main><script type='module'>import { getCurrentMatterFromMirror } from './app-data.js'; import { createDraftStudioDocument, createDraftVerificationRequest } from './legal-workflow-data.js'; import { currentUserHasCapability, capabilityRestrictionMessage, getCurrentAccessProfile } from './access-data.js'; let latestDoc=null; let canUse=true; function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))} async function renderHeader(){const matter=getCurrentMatterFromMirror();const profile=await getCurrentAccessProfile();document.getElementById('matterChip').textContent=matter?matter.name:'No current matter';document.getElementById('roleChip').textContent=profile.role;return matter;} async function applyGuard(){ canUse=await currentUserHasCapability('draft-studio'); document.getElementById('restrictionBox').style.display=canUse?'none':'block'; document.getElementById('workGrid').style.display=canUse?'grid':'none'; if(!canUse){ document.getElementById('restrictionText').textContent=capabilityRestrictionMessage('draft-studio'); } } document.getElementById('createBtn').addEventListener('click',async()=>{ try{ if(!canUse) return; latestDoc=await createDraftStudioDocument({matterClass:document.getElementById('classSelect').value,instructions:document.getElementById('instructionsBox').value.trim()}); document.getElementById('draftBox').className=''; document.getElementById('draftBox').innerHTML='<pre style="white-space:pre-wrap;margin:0;font-family:inherit;line-height:1.75">'+esc(latestDoc.content)+'</pre><div class="row" style="margin-top:12px"><a class="btn" href="./governed-export.html?doc='+latestDoc.id+'">Open this draft in Governed Export</a></div>'; document.getElementById('statusText').textContent='Draft created and saved.'; }catch(err){ document.getElementById('statusText').textContent=err.message||'Failed to create draft.'; }}); document.getElementById('verifyBtn').addEventListener('click',async()=>{ try{ if(!canUse) return; const matter=await renderHeader(); if(!latestDoc){ document.getElementById('statusText').textContent='Create a draft first.'; return; } await createDraftVerificationRequest(latestDoc.id, matter?.id||null); document.getElementById('statusText').textContent='Draft sent to verification queue.'; }catch(err){ document.getElementById('statusText').textContent=err.message||'Failed to send draft to verification.'; }}); window.addEventListener('storage',()=>{renderHeader();applyGuard();}); renderHeader(); applyGuard();</script></body></html>
