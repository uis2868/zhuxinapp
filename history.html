<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Zhuxin History</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap' rel='stylesheet'><style>:root{--bg:#f4f3f0;--shell:#fbfbf9;--surface:#f1efeb;--card:#fff;--border:#e6e1d8;--text:#1a1816;--muted:#79726b;--shadow:0 22px 60px rgba(40,35,30,.12);--serif:'Playfair Display',Georgia,serif;--sans:'Inter',system-ui,sans-serif}*{box-sizing:border-box}html,body{margin:0;padding:0;background:linear-gradient(180deg,#edeaf1,#f4f3f0 25%,#f4f3f0);color:var(--text);font-family:var(--sans)}a{text-decoration:none;color:inherit}button{font:inherit;cursor:pointer}.top{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px;background:rgba(251,251,249,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}.brand{display:flex;align-items:center;gap:10px}.mark{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-family:var(--serif);font-weight:500;letter-spacing:-.04em;color:#fff;background:linear-gradient(180deg,#4b4844,#2e2b28);border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 2px 4px rgba(0,0,0,.10)}.name{font-family:var(--serif);font-size:28px;line-height:1}.sub{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}.row,.chips{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.btn{border-radius:12px;padding:10px 14px;border:1px solid var(--border);background:#fff;color:var(--text)}.chip{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border:1px solid var(--border);border-radius:999px;background:#fff;font-size:12px;color:var(--muted)}.shell{max-width:1260px;margin:0 auto;padding:20px 16px 28px;display:grid;gap:16px}.hero,.card,.item{background:var(--shell);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow)}.hero,.card,.item{padding:18px}.hero h1{margin:12px 0 0;font-family:var(--serif);font-size:48px;font-weight:400;letter-spacing:-.02em}.desc,.meta{color:var(--muted);font-size:13px;line-height:1.65}.layout{display:grid;gap:16px}.list{display:grid;gap:12px}.item h4{margin:0 0 6px;font-size:18px;font-weight:500}.empty{padding:18px;border:1px dashed var(--border);border-radius:16px;color:var(--muted);background:#fff}@media(min-width:980px){.layout{grid-template-columns:1fr 1fr}}</style><script src='./supabase-config.js'></script></head><body><header class='top'><div class='brand'><div class='mark'>Z</div><div><div class='name'>Zhuxin</div><div class='sub'>History</div></div></div><div class='row'><span id='modeChip' class='chip'>Local mode</span><a class='btn' href='./assistant.html'>Assistant</a><a class='btn' href='./notice-generator.html'>Notice Generator</a><a class='btn' href='./index.html'>Dashboard</a></div></header><main class='shell'><section class='hero'><div class='chips'><span class='chip'>Saved work</span><span class='chip' id='matterChip'>No current matter</span></div><h1>History</h1><div class='desc'>Review saved assistant threads and generated documents. This page reads the same shared data layer used by the working modules.</div></section><section class='layout'><section class='card'><div class='row' style='justify-content:space-between'><h3 style='margin:0;font-family:var(--serif);font-weight:400;font-size:28px'>Threads</h3><button class='btn' id='refreshThreadsBtn'>Refresh</button></div><div id='threadsList' class='list' style='margin-top:14px'></div></section><section class='card'><div class='row' style='justify-content:space-between'><h3 style='margin:0;font-family:var(--serif);font-weight:400;font-size:28px'>Generated documents</h3><button class='btn' id='refreshDocsBtn'>Refresh</button></div><div id='docsList' class='list' style='margin-top:14px'></div></section></section></main><script type='module'>import { getAuthSummary, getCurrentMatterFromMirror, listThreads, listGeneratedDocuments } from './app-data.js'; const ids={modeChip:document.getElementById('modeChip'),matterChip:document.getElementById('matterChip'),threadsList:document.getElementById('threadsList'),docsList:document.getElementById('docsList')}; function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))} function formatDate(value){try{return new Date(value).toLocaleString('en-GB')}catch{return value}} async function renderHeader(){ const auth=await getAuthSummary(); ids.modeChip.textContent=auth.mode==='supabase'?'Supabase mode':'Local mode'; const current=getCurrentMatterFromMirror(); ids.matterChip.textContent=current?current.name:'No current matter'; return current; } async function renderThreads(){ const current=await renderHeader(); const threads=await listThreads({ matterId: current?.id||null }); ids.threadsList.innerHTML=''; if(!threads.length){ ids.threadsList.innerHTML='<div class="empty">No saved threads yet.</div>'; return; } threads.forEach(t=>{ const div=document.createElement('div'); div.className='item'; div.innerHTML='<h4>'+escapeHtml(t.title)+'</h4><div class="meta">'+escapeHtml(t.moduleName)+' · '+escapeHtml(formatDate(t.updatedAt||t.createdAt))+'</div>'; ids.threadsList.appendChild(div); }); } async function renderDocs(){ const current=getCurrentMatterFromMirror(); const docs=await listGeneratedDocuments({ matterId: current?.id||null }); ids.docsList.innerHTML=''; if(!docs.length){ ids.docsList.innerHTML='<div class="empty">No generated documents yet.</div>'; return; } docs.forEach(d=>{ const div=document.createElement('div'); div.className='item'; div.innerHTML='<h4>'+escapeHtml(d.title)+'</h4><div class="meta">'+escapeHtml(d.moduleName)+' · '+escapeHtml(formatDate(d.createdAt))+'</div><div class="meta" style="margin-top:8px">'+escapeHtml((d.content||'').slice(0,180))+'</div>'; ids.docsList.appendChild(div); }); } async function renderAll(){ await renderThreads(); await renderDocs(); } document.getElementById('refreshThreadsBtn').addEventListener('click',renderThreads); document.getElementById('refreshDocsBtn').addEventListener('click',renderDocs); window.addEventListener('storage',e=>{ if(['zhuxin_matter_state','zhuxin_threads_state','zhuxin_generated_documents','zhuxin_local_auth'].includes(e.key)) renderAll(); }); window.addEventListener('focus',renderAll); renderAll();</script></body></html>
