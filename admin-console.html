<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Zhuxin Admin Console</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap' rel='stylesheet'><style>:root{--shell:#fbfbf9;--surface:#f1efeb;--border:#e6e1d8;--text:#1a1816;--muted:#79726b;--shadow:0 22px 60px rgba(40,35,30,.12);--serif:'Playfair Display',Georgia,serif;--sans:'Inter',system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#edeaf1,#f4f3f0 25%,#f4f3f0);font-family:var(--sans);color:var(--text)}a{text-decoration:none;color:inherit}button,input{font:inherit}button{cursor:pointer}.top,.hero,.card{background:var(--shell);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow)}.top{position:sticky;top:0;border-radius:0;box-shadow:none;display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center}.mark{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;background:linear-gradient(180deg,#4b4844,#2e2b28);color:#fff;font-family:var(--serif)}.name{font-family:var(--serif);font-size:28px}.sub{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}.shell{max-width:1180px;margin:0 auto;padding:20px 16px 28px;display:grid;gap:16px}.hero,.card{padding:18px}.hero h1{margin:12px 0 0;font-family:var(--serif);font-size:50px;font-weight:400}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.chip,.btn,.primary{padding:8px 12px;border:1px solid var(--border);border-radius:999px;background:#fff;font-size:12px;color:var(--muted)}.btn,.primary{border-radius:12px;color:var(--text)}.primary{background:#8e8a86;border-color:#8e8a86;color:#fff}.small{color:var(--muted);font-size:13px;line-height:1.6}label{display:flex;gap:8px;align-items:center;margin-bottom:10px}.locked{background:#fff8f2}</style></head><body><header class='top'><div class='brand'><div class='mark'>Z</div><div><div class='name'>Zhuxin</div><div class='sub'>Admin console</div></div></div><div class='row'><a class='btn' href='./dashboard-home.html'>Home</a><a class='btn' href='./billing.html'>Billing</a></div></header><main class='shell'><section class='hero'><div class='row'><span id='roleChip' class='chip'>Admin</span></div><h1>Admin Console</h1><p class='small'>Manage feature rules and basic platform controls.</p></section><section id='restrictionBox' class='card locked' style='display:none'><h2 style='margin:0 0 10px;font-family:var(--serif);font-weight:400'>Restricted page</h2><div id='restrictionText' class='small'></div></section><section id='workCard' class='card'><label><input id='enrollmentCheck' type='checkbox'> Require advocate enrollment ID</label><label><input id='publicDraftingCheck' type='checkbox'> Allow public advanced drafting</label><label><input id='territoryCheck' type='checkbox'> Keep offline territorial matching strict</label><div class='row' style='margin-top:12px'><button class='primary' id='saveBtn'>Save controls</button></div><div id='statusText' class='small' style='margin-top:10px'></div></section></main><script type='module'>import { getCurrentAccessProfile, getAdminControls, saveAdminControls, currentUserHasCapability, capabilityRestrictionMessage } from './access-data.js'; let canUse=true; async function render(){ const access=await getCurrentAccessProfile(); document.getElementById('roleChip').textContent=access.role; const controls=getAdminControls(); document.getElementById('enrollmentCheck').checked=controls.enrollmentRequired; document.getElementById('publicDraftingCheck').checked=controls.publicAdvancedDrafting; document.getElementById('territoryCheck').checked=controls.offlineTerritoryStrict; } async function applyGuard(){ canUse=await currentUserHasCapability('admin-console'); document.getElementById('restrictionBox').style.display=canUse?'none':'block'; document.getElementById('workCard').style.display=canUse?'block':'none'; if(!canUse){ document.getElementById('restrictionText').textContent=capabilityRestrictionMessage('admin-console'); } } document.getElementById('saveBtn').addEventListener('click',()=>{ if(!canUse) return; saveAdminControls({ enrollmentRequired:document.getElementById('enrollmentCheck').checked, publicAdvancedDrafting:document.getElementById('publicDraftingCheck').checked, offlineTerritoryStrict:document.getElementById('territoryCheck').checked }); document.getElementById('statusText').textContent='Admin controls saved.';}); window.addEventListener('storage',()=>{render();applyGuard();}); render(); applyGuard();</script></body></html>
