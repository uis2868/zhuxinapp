<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Zhuxin Governed Export</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap' rel='stylesheet'><style>:root{--shell:#fbfbf9;--surface:#f1efeb;--paper:#fffdf9;--border:#e6e1d8;--text:#1a1816;--muted:#79726b;--shadow:0 22px 60px rgba(40,35,30,.12);--serif:'Playfair Display',Georgia,serif;--sans:'Inter',system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#edeaf1,#f4f3f0 25%,#f4f3f0);font-family:var(--sans);color:var(--text)}a{text-decoration:none;color:inherit}button,select{font:inherit}button{cursor:pointer}.top,.hero,.card{background:var(--shell);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow)}.top{position:sticky;top:0;border-radius:0;box-shadow:none;display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center}.mark{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;background:linear-gradient(180deg,#4b4844,#2e2b28);color:#fff;font-family:var(--serif)}.name{font-family:var(--serif);font-size:28px}.sub{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}.shell{max-width:1180px;margin:0 auto;padding:20px 16px 28px;display:grid;gap:16px}.hero,.card{padding:18px}.hero h1{margin:12px 0 0;font-family:var(--serif);font-size:50px;font-weight:400}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.chip,.btn,.primary,.soft{padding:8px 12px;border:1px solid var(--border);border-radius:999px;background:#fff;font-size:12px;color:var(--muted)}.btn,.primary,.soft{border-radius:12px;color:var(--text)}.primary{background:#8e8a86;border-color:#8e8a86;color:#fff}.soft{background:#f7f5f0}.small{color:var(--muted);font-size:13px;line-height:1.6}.field{display:grid;gap:6px}.field select{padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:var(--surface)}.preview{background:var(--paper);border:1px solid var(--border);border-radius:18px;padding:28px;box-shadow:inset 0 1px 0 rgba(255,255,255,.8)}.paper-header{padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:18px}.paper-header h3{margin:0;font-family:var(--serif);font-weight:400;font-size:28px}.paper-meta{margin-top:6px;color:var(--muted);font-size:12px;line-height:1.6}.verify-block{margin-top:18px;padding:14px;border:1px solid var(--border);border-radius:14px;background:#faf8f4}.verify-block h4{margin:0 0 8px;font-size:14px}.content-text{white-space:pre-wrap;margin:0;font-family:inherit;line-height:1.8}.empty{padding:18px;border:1px dashed var(--border);border-radius:16px;color:var(--muted);background:#fff}</style></head><body><header class='top'><div class='brand'><div class='mark'>Z</div><div><div class='name'>Zhuxin</div><div class='sub'>Governed Export</div></div></div><div class='row'><a class='btn' href='./verification-queue.html'>Verification Queue</a><a class='btn' href='./settings.html'>Settings</a><a class='btn' href='./dashboard-home.html'>Home</a></div></header><main class='shell'><section class='hero'><div class='row'><span id='matterChip' class='chip'>No current matter</span></div><h1>Governed Export</h1><p class='small'>Export behavior depends on verification. Unverified output keeps a strong disclaimer; verified output shows chamber pad and reviewer signoff details.</p></section><section class='card'><div class='field'><label class='small'>Choose document</label><select id='docSelect'></select></div><div class='row' style='margin-top:12px'><button class='primary' id='loadBtn'>Load export</button><button class='soft' id='copyBtn'>Copy text</button></div><div id='statusText' class='small' style='margin-top:10px'></div></section><section class='card'><h2 style='margin:0 0 12px;font-family:var(--serif);font-weight:400'>Rendered export</h2><div id='renderBox' class='empty'>No document selected yet.</div></section></main><script type='module'>import { getCurrentMatterFromMirror, listGeneratedDocuments, getAppSettings } from './app-data.js'; import { getGovernedExportSummary } from './legal-workflow-data.js'; let latestText=''; function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))} function requestedDocId(){ return new URLSearchParams(window.location.search).get('doc')||''; } async function renderHeader(){ const matter=getCurrentMatterFromMirror(); document.getElementById('matterChip').textContent=matter?matter.name:'No current matter'; const docs=await listGeneratedDocuments({matterId:matter?.id||null}); const select=document.getElementById('docSelect'); select.innerHTML=''; if(!docs.length){const o=document.createElement('option');o.value='';o.textContent='No documents available';select.appendChild(o); return;} docs.forEach(d=>{const o=document.createElement('option');o.value=d.id;o.textContent=d.title; if(d.id===requestedDocId()) o.selected=true; select.appendChild(o);}); if(requestedDocId() && docs.some(d=>d.id===requestedDocId())) loadExport(); } async function loadExport(){ const id=document.getElementById('docSelect').value; if(!id){document.getElementById('statusText').textContent='No document available.'; return;} const summary=await getGovernedExportSummary(id); const settings=await getAppSettings(); const pad=settings.preferences?.chamberPad||{}; let text=summary.displayContent||''; if(summary.exportMode==='verified-export' && pad.name){ text=[ text ].filter(Boolean).join('\n'); } latestText=text; const headerTitle=summary.exportMode==='verified-export' ? (pad.name||'Verified Chamber Export') : 'System-generated unverified output'; const headerMeta=[ pad.address||'', pad.contact||'', summary.disclaimer ].filter(Boolean).join(' · '); const verifyBlock=summary.verificationBlock?'<div class="verify-block"><h4>Verification block</h4><div class="small">Reviewer: '+esc(summary.verificationBlock.reviewerName)+'</div><div class="small">Enrollment ID: '+esc(summary.verificationBlock.reviewerEnrollmentId)+'</div><div class="small">Verified at: '+esc(summary.verificationBlock.verifiedAt?new Date(summary.verificationBlock.verifiedAt).toLocaleString('en-GB'):'Not recorded')+'</div><div class="small" style="margin-top:8px">'+esc(summary.verificationBlock.reviewerNote)+'</div></div>':''; const chamberHeader=summary.exportMode==='verified-export' && (pad.name||pad.logoText||pad.contact||pad.address) ? '<div class="paper-header"><div class="small">'+esc(pad.logoText||'')+'</div><h3>'+esc(pad.name||headerTitle)+'</h3><div class="paper-meta">'+esc([pad.address||'',pad.contact||''].filter(Boolean).join(' · '))+'</div></div>' : '<div class="paper-header"><h3>'+esc(headerTitle)+'</h3><div class="paper-meta">'+esc(headerMeta)+'</div></div>'; document.getElementById('renderBox').className=''; document.getElementById('renderBox').innerHTML='<div class="preview">'+chamberHeader+'<pre class="content-text">'+esc(text)+'</pre>'+verifyBlock+(pad.footer?'<div class="paper-meta" style="margin-top:18px">'+esc(pad.footer)+'</div>':'')+'</div>'; document.getElementById('statusText').textContent='Loaded '+summary.exportMode+'.'; } document.getElementById('loadBtn').addEventListener('click',loadExport); document.getElementById('copyBtn').addEventListener('click',async()=>{ if(!latestText){document.getElementById('statusText').textContent='Load an export first.'; return;} if(navigator.clipboard?.writeText){ await navigator.clipboard.writeText(latestText); } document.getElementById('statusText').textContent='Copied export text.'; }); window.addEventListener('storage',renderHeader); renderHeader();</script></body></html>
