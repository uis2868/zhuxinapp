<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Zhuxin Matter Hub</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap' rel='stylesheet'><style>:root{--bg:#f4f3f0;--shell:#fbfbf9;--surface:#f1efeb;--card:#ffffff;--border:#e6e1d8;--text:#1a1816;--muted:#79726b;--shadow:0 22px 60px rgba(40,35,30,.12);--serif:'Playfair Display',Georgia,serif;--sans:'Inter',system-ui,sans-serif}*{box-sizing:border-box}html,body{margin:0;padding:0;background:linear-gradient(180deg,#edeaf1,#f4f3f0 25%,#f4f3f0);color:var(--text);font-family:var(--sans)}a{text-decoration:none;color:inherit}button,input,textarea,select{font:inherit}button{cursor:pointer}.top{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px;background:rgba(251,251,249,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}.brand{display:flex;align-items:center;gap:10px}.mark{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-family:var(--serif);font-weight:500;letter-spacing:-.04em;color:#fff;background:linear-gradient(180deg,#4b4844,#2e2b28);border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 2px 4px rgba(0,0,0,.10)}.name{font-family:var(--serif);font-size:28px;line-height:1}.sub{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}.row,.chips,.badges{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.btn,.primary,.danger{border-radius:12px;padding:10px 14px;border:1px solid var(--border);background:#fff;color:var(--text)}.primary{background:#8e8a86;border-color:#8e8a86;color:#fff}.danger{color:#8b4040;background:#fff5f5;border-color:#efd7d7}.shell{max-width:1200px;margin:0 auto;padding:20px 16px 28px;display:grid;gap:16px}.hero,.card,.matter-card{background:var(--shell);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow)}.hero,.card{padding:18px}.hero h1{margin:12px 0 0;font-family:var(--serif);font-size:48px;font-weight:400;letter-spacing:-.02em}.badge,.chip{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border:1px solid var(--border);border-radius:999px;background:#fff;font-size:12px;color:var(--muted)}.badge.soft,.chip.active{background:#f0efec;color:var(--text)}.desc,.small,.meta{color:var(--muted);font-size:13px;line-height:1.65}.grid{display:grid;gap:16px}.form{display:grid;gap:12px}.field{display:grid;gap:6px}.field span{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}.field input,.field textarea,.field select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:var(--surface);color:var(--text);outline:none}.field textarea{min-height:110px;resize:vertical}.matter-list{display:grid;gap:14px}.matter-card{padding:16px;display:grid;gap:10px;background:#fff}.matter-card.current{outline:2px solid #d9d4cb}.matter-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}.matter-title{font-family:var(--serif);font-size:26px;line-height:1.2}.empty{padding:18px;border:1px dashed var(--border);border-radius:16px;color:var(--muted);background:#fff}@media(min-width:980px){.grid{grid-template-columns:420px minmax(0,1fr)}}</style></head><body><header class='top'><div class='brand'><div class='mark'>Z</div><div><div class='name'>Zhuxin</div><div class='sub'>Matter Hub</div></div></div><div class='row'><a class='btn' href='./index.html'>Dashboard</a><button class='btn' onclick='seedDemo()'>Load demo</button><button class='primary' onclick='focusForm()'>New matter</button></div></header><main class='shell'><section class='hero'><div class='badges'><span class='badge soft'>Phase 1</span><span class='badge'>Matter system</span><span class='badge'>Shared context</span></div><h1>Matter Hub</h1><div class='desc'>Create matters, choose the current matter, and keep one shared context for the rest of Zhuxin.</div></section><section class='grid'><section class='card'><div class='row' style='justify-content:space-between'><h3 style='margin:0;font-family:var(--serif);font-weight:400;font-size:24px'>Create matter</h3><span id='currentChip' class='chip'>No current matter</span></div><div class='form' style='margin-top:14px'><label class='field'><span>Matter name</span><input id='matterName' placeholder='e.g. Acme v Delta — Patent Defense'></label><label class='field'><span>Client</span><input id='matterClient' placeholder='e.g. Acme Corp'></label><label class='field'><span>Project / deal</span><input id='matterProject' placeholder='e.g. Delta Litigation'></label><div class='row' style='gap:12px'><label class='field' style='flex:1'><span>Practice area</span><select id='matterArea'><option>Litigation</option><option>M&A</option><option>Commercial Contracts</option><option>Employment</option><option>Regulatory</option><option>Tax</option><option>General Advisory</option></select></label><label class='field' style='flex:1'><span>Jurisdiction</span><input id='matterJurisdiction' placeholder='e.g. UK / Delaware / Bangladesh'></label></div><label class='field'><span>Notes</span><textarea id='matterNotes' placeholder='Facts, posture, or special instructions...'></textarea></label><div class='row'><button class='primary' onclick='createMatter()'>Save matter</button><button class='btn' onclick='clearForm()'>Clear</button></div></div></section><section class='card'><div class='row' style='justify-content:space-between'><h3 style='margin:0;font-family:var(--serif);font-weight:400;font-size:24px'>All matters</h3><div class='row'><button class='btn' onclick='renderMatters()'>Refresh</button><button class='danger' onclick='clearAllMatters()'>Clear all</button></div></div><div id='matterList' class='matter-list' style='margin-top:14px'></div></section></section></main><script>const KEY='zhuxin_matter_state';function getState(){return JSON.parse(localStorage.getItem(KEY)||'{"currentId":null,"matters":[]}')}function setState(state){localStorage.setItem(KEY,JSON.stringify(state));window.dispatchEvent(new StorageEvent('storage',{key:KEY,newValue:JSON.stringify(state)}))}function focusForm(){document.getElementById('matterName').focus()}function clearForm(){['matterName','matterClient','matterProject','matterJurisdiction','matterNotes'].forEach(id=>document.getElementById(id).value='');document.getElementById('matterArea').value='Litigation'}function createMatter(){const name=document.getElementById('matterName').value.trim();if(!name){alert('Add a matter name first.');return}const state=getState();const matter={id:'m_'+Date.now(),name,client:document.getElementById('matterClient').value.trim()||'Unspecified client',project:document.getElementById('matterProject').value.trim()||'General project',area:document.getElementById('matterArea').value,jurisdiction:document.getElementById('matterJurisdiction').value.trim()||'Unspecified',notes:document.getElementById('matterNotes').value.trim(),createdAt:new Date().toISOString()};state.matters.unshift(matter);state.currentId=matter.id;setState(state);clearForm();renderMatters()}function selectMatter(id){const state=getState();state.currentId=id;setState(state);renderMatters()}function deleteMatter(id){const state=getState();state.matters=state.matters.filter(m=>m.id!==id);if(state.currentId===id)state.currentId=state.matters[0]?.id||null;setState(state);renderMatters()}function clearAllMatters(){if(!confirm('Clear all saved matters?'))return;setState({currentId:null,matters:[]});renderMatters()}function seedDemo(){const state=getState();if(state.matters.length){alert('Demo matters were not loaded because you already have saved matters.');return}state.matters=[{id:'m_demo_1',name:'Acme v Delta — Patent Defense',client:'Acme Corp',project:'Delta Litigation',area:'Litigation',jurisdiction:'US / UK',notes:'Initial complaint review and contradiction search.',createdAt:new Date().toISOString()},{id:'m_demo_2',name:'Northbridge — Supply Agreement Review',client:'Northbridge Holdings',project:'Commercial Contracts',area:'Commercial Contracts',jurisdiction:'England',notes:'Review change-of-control and assignment language.',createdAt:new Date().toISOString()},{id:'m_demo_3',name:'Avenor — Series B Financing',client:'Avenor AI',project:'Series B Financing',area:'M&A',jurisdiction:'Delaware',notes:'Draft closing checklist and timeline.',createdAt:new Date().toISOString()}];state.currentId='m_demo_1';setState(state);renderMatters()}function formatDate(value){try{return new Date(value).toLocaleString('en-GB')}catch{return value}}function renderHeader(state){const chip=document.getElementById('currentChip');const current=state.matters.find(m=>m.id===state.currentId);chip.textContent=current?('Current: '+current.name):'No current matter';chip.classList.toggle('active',!!current)}function renderMatters(){const state=getState();renderHeader(state);const box=document.getElementById('matterList');box.innerHTML='';if(!state.matters.length){box.innerHTML='<div class="empty">No matters yet. Create the first matter to start sharing context across Zhuxin.</div>';return}state.matters.forEach(m=>{const current=m.id===state.currentId;const card=document.createElement('div');card.className='matter-card'+(current?' current':'');card.innerHTML='<div class="matter-head"><div><div class="matter-title">'+escapeHtml(m.name)+'</div><div class="chips" style="margin-top:8px"><span class="chip'+(current?' active':'')+'">'+(current?'Current matter':'Saved matter')+'</span><span class="chip">'+escapeHtml(m.area)+'</span><span class="chip">'+escapeHtml(m.jurisdiction)+'</span></div></div><div class="row"><button class="btn" onclick="selectMatter(\''+m.id+'\')">'+(current?'Selected':'Make current')+'</button><button class="danger" onclick="deleteMatter(\''+m.id+'\')">Delete</button></div></div><div class="meta"><div><strong>Client:</strong> '+escapeHtml(m.client)+'</div><div><strong>Project:</strong> '+escapeHtml(m.project)+'</div><div><strong>Created:</strong> '+escapeHtml(formatDate(m.createdAt))+'</div>'+(m.notes?'<div><strong>Notes:</strong> '+escapeHtml(m.notes)+'</div>':'')+'</div>';box.appendChild(card)})}function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}renderMatters();window.addEventListener('storage',e=>{if(e.key===KEY)renderMatters()});</script></body></html>
