<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Zhuxin Matter Hub</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap' rel='stylesheet'><style>:root{--bg:#f4f3f0;--shell:#fbfbf9;--surface:#f1efeb;--card:#ffffff;--border:#e6e1d8;--text:#1a1816;--muted:#79726b;--shadow:0 22px 60px rgba(40,35,30,.12);--serif:'Playfair Display',Georgia,serif;--sans:'Inter',system-ui,sans-serif}*{box-sizing:border-box}html,body{margin:0;padding:0;background:linear-gradient(180deg,#edeaf1,#f4f3f0 25%,#f4f3f0);color:var(--text);font-family:var(--sans)}a{text-decoration:none;color:inherit}button,input,textarea,select{font:inherit}button{cursor:pointer}.top{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px;background:rgba(251,251,249,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}.brand{display:flex;align-items:center;gap:10px}.mark{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-family:var(--serif);font-weight:500;letter-spacing:-.04em;color:#fff;background:linear-gradient(180deg,#4b4844,#2e2b28);border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 2px 4px rgba(0,0,0,.10)}.name{font-family:var(--serif);font-size:28px;line-height:1}.sub{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}.row,.chips,.badges{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.btn,.primary,.danger{border-radius:12px;padding:10px 14px;border:1px solid var(--border);background:#fff;color:var(--text)}.primary{background:#8e8a86;border-color:#8e8a86;color:#fff}.danger{color:#8b4040;background:#fff5f5;border-color:#efd7d7}.shell{max-width:1200px;margin:0 auto;padding:20px 16px 28px;display:grid;gap:16px}.hero,.card,.matter-card{background:var(--shell);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow)}.hero,.card{padding:18px}.hero h1{margin:12px 0 0;font-family:var(--serif);font-size:48px;font-weight:400;letter-spacing:-.02em}.badge,.chip{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border:1px solid var(--border);border-radius:999px;background:#fff;font-size:12px;color:var(--muted)}.badge.soft,.chip.active{background:#f0efec;color:var(--text)}.desc,.small,.meta{color:var(--muted);font-size:13px;line-height:1.65}.grid{display:grid;gap:16px}.form{display:grid;gap:12px}.field{display:grid;gap:6px}.field span{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}.field input,.field textarea,.field select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:var(--surface);color:var(--text);outline:none}.field textarea{min-height:110px;resize:vertical}.matter-list{display:grid;gap:14px}.matter-card{padding:16px;display:grid;gap:10px;background:#fff}.matter-card.current{outline:2px solid #d9d4cb}.matter-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}.matter-title{font-family:var(--serif);font-size:26px;line-height:1.2}.empty{padding:18px;border:1px dashed var(--border);border-radius:16px;color:var(--muted);background:#fff}@media(min-width:980px){.grid{grid-template-columns:420px minmax(0,1fr)}}</style><script src='./supabase-config.js'></script></head><body><header class='top'><div class='brand'><div class='mark'>Z</div><div><div class='name'>Zhuxin</div><div class='sub'>Matter Hub</div></div></div><div class='row'><span id='modeChip' class='chip'>Local mode</span><a class='btn' href='./auth.html'>Auth</a><a class='btn' href='./index.html'>Dashboard</a><button class='btn' id='seedBtn'>Load demo</button><button class='primary' id='newMatterBtn'>New matter</button></div></header><main class='shell'><section class='hero'><div class='badges'><span class='badge soft'>Phase 1</span><span class='badge'>Matter system</span><span class='badge'>Shared context</span></div><h1>Matter Hub</h1><div class='desc'>Create matters, choose the current matter, and keep one shared context for the rest of Zhuxin.</div></section><section class='grid'><section class='card'><div class='row' style='justify-content:space-between'><h3 style='margin:0;font-family:var(--serif);font-weight:400;font-size:24px'>Create matter</h3><span id='currentChip' class='chip'>No current matter</span></div><div class='form' style='margin-top:14px'><label class='field'><span>Matter name</span><input id='matterName' placeholder='e.g. Acme v Delta — Patent Defense'></label><label class='field'><span>Client</span><input id='matterClient' placeholder='e.g. Acme Corp'></label><label class='field'><span>Project / deal</span><input id='matterProject' placeholder='e.g. Delta Litigation'></label><div class='row' style='gap:12px'><label class='field' style='flex:1'><span>Practice area</span><select id='matterArea'><option>Litigation</option><option>M&A</option><option>Commercial Contracts</option><option>Employment</option><option>Regulatory</option><option>Tax</option><option>General Advisory</option></select></label><label class='field' style='flex:1'><span>Jurisdiction</span><input id='matterJurisdiction' placeholder='e.g. UK / Delaware / Bangladesh'></label></div><label class='field'><span>Notes</span><textarea id='matterNotes' placeholder='Facts, posture, or special instructions...'></textarea></label><div class='row'><button class='primary' id='saveMatterBtn'>Save matter</button><button class='btn' id='clearMatterBtn'>Clear</button></div></div></section><section class='card'><div class='row' style='justify-content:space-between'><h3 style='margin:0;font-family:var(--serif);font-weight:400;font-size:24px'>All matters</h3><div class='row'><button class='btn' id='refreshMattersBtn'>Refresh</button><button class='danger' id='clearAllBtn'>Clear all</button></div></div><div id='matterList' class='matter-list' style='margin-top:14px'></div></section></section></main><script type='module'>import { getAuthSummary, listMatters, createMatter, setCurrentMatter, deleteMatter, clearAllMatters, seedDemoMatters } from './app-data.js'; const els={modeChip:document.getElementById('modeChip'),currentChip:document.getElementById('currentChip'),matterList:document.getElementById('matterList'),matterName:document.getElementById('matterName'),matterClient:document.getElementById('matterClient'),matterProject:document.getElementById('matterProject'),matterArea:document.getElementById('matterArea'),matterJurisdiction:document.getElementById('matterJurisdiction'),matterNotes:document.getElementById('matterNotes')}; function focusForm(){els.matterName.focus()} function clearForm(){['matterName','matterClient','matterProject','matterJurisdiction','matterNotes'].forEach(k=>els[k].value='');els.matterArea.value='Litigation'} function formatDate(value){try{return new Date(value).toLocaleString('en-GB')}catch{return value}} function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))} async function renderPage(){ try { const auth=await getAuthSummary(); els.modeChip.textContent=auth.mode==='supabase'?'Supabase mode':'Local mode'; const state=await listMatters(); const current=state.matters.find(m=>m.id===state.currentId); els.currentChip.textContent=current?('Current: '+current.name):'No current matter'; els.currentChip.classList.toggle('active',!!current); els.matterList.innerHTML=''; if(!state.matters.length){ els.matterList.innerHTML='<div class="empty">No matters yet. Create the first matter to start sharing context across Zhuxin.</div>'; return; } state.matters.forEach(m=>{ const currentMatter=m.id===state.currentId; const card=document.createElement('div'); card.className='matter-card'+(currentMatter?' current':''); card.innerHTML='<div class="matter-head"><div><div class="matter-title">'+escapeHtml(m.name)+'</div><div class="chips" style="margin-top:8px"><span class="chip'+(currentMatter?' active':'')+'">'+(currentMatter?'Current matter':'Saved matter')+'</span><span class="chip">'+escapeHtml(m.area)+'</span><span class="chip">'+escapeHtml(m.jurisdiction)+'</span></div></div><div class="row"><button class="btn" data-action="select" data-id="'+m.id+'">'+(currentMatter?'Selected':'Make current')+'</button><button class="danger" data-action="delete" data-id="'+m.id+'">Delete</button></div></div><div class="meta"><div><strong>Client:</strong> '+escapeHtml(m.client)+'</div><div><strong>Project:</strong> '+escapeHtml(m.project)+'</div><div><strong>Created:</strong> '+escapeHtml(formatDate(m.createdAt))+'</div>'+(m.notes?'<div><strong>Notes:</strong> '+escapeHtml(m.notes)+'</div>':'')+'</div>'; els.matterList.appendChild(card); }); } catch (error) { els.matterList.innerHTML='<div class="empty">'+escapeHtml(error.message||'Failed to load matters.')+'</div>'; }} document.getElementById('newMatterBtn').addEventListener('click',focusForm); document.getElementById('clearMatterBtn').addEventListener('click',clearForm); document.getElementById('refreshMattersBtn').addEventListener('click',renderPage); document.getElementById('seedBtn').addEventListener('click',async()=>{ try{ await seedDemoMatters(); renderPage(); }catch(error){ alert(error.message||'Unable to load demo matters.'); }}); document.getElementById('clearAllBtn').addEventListener('click',async()=>{ if(!confirm('Clear all saved matters?')) return; await clearAllMatters(); renderPage(); }); document.getElementById('saveMatterBtn').addEventListener('click',async()=>{ const name=els.matterName.value.trim(); if(!name){ alert('Add a matter name first.'); return; } try{ await createMatter({name,client:els.matterClient.value.trim(),project:els.matterProject.value.trim(),area:els.matterArea.value,jurisdiction:els.matterJurisdiction.value.trim(),notes:els.matterNotes.value.trim()}); clearForm(); renderPage(); }catch(error){ alert(error.message||'Unable to save matter.'); }}); els.matterList.addEventListener('click',async(event)=>{ const button=event.target.closest('button[data-action]'); if(!button) return; const id=button.dataset.id; try{ if(button.dataset.action==='select'){ await setCurrentMatter(id); } if(button.dataset.action==='delete'){ await deleteMatter(id); } renderPage(); }catch(error){ alert(error.message||'Action failed.'); }}); window.addEventListener('storage',e=>{ if(['zhuxin_matter_state','zhuxin_local_auth'].includes(e.key)) renderPage(); }); renderPage();</script></body></html>
