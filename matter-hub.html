<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Zhuxin Matter Hub</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap' rel='stylesheet'><style>:root{--bg:#0b0b0b;--panel:#111;--panel2:#151515;--line:#2d2d2d;--text:#f3f3f1;--muted:#b5b5b0;--soft:#f3f2ee;--softText:#151515}*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}a{text-decoration:none;color:inherit}button,input,textarea,select{font:inherit}.top{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 14px;background:rgba(0,0,0,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:10px}.mark{width:34px;height:34px;border-radius:10px;background:var(--soft);color:#111;display:grid;place-items:center;font-weight:800}.name{font-family:'Cormorant Garamond',serif;font-size:28px;line-height:1;font-weight:600}.sub{font-size:11px;color:var(--muted)}.btn,.primary,.danger{border:none;border-radius:14px;padding:10px 12px;font-weight:600;cursor:pointer}.btn{background:#131313;border:1px solid var(--line);color:var(--muted)}.primary{background:var(--soft);color:var(--softText)}.danger{background:#2a1111;border:1px solid #4a1f1f;color:#ffcece}.shell{padding:14px;display:grid;gap:14px}.hero,.card,.matter-card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px}.badges,.row,.chips{display:flex;gap:8px;flex-wrap:wrap}.badge,.chip{padding:7px 10px;border-radius:999px;border:1px solid var(--line);background:#151515;color:var(--muted);font-size:12px}.badge.soft,.chip.active{background:var(--soft);color:#111;border-color:var(--soft)}.title{font-family:'Cormorant Garamond',serif;font-size:54px;line-height:.92;font-weight:600;letter-spacing:-.06em;margin:14px 0 0}.desc,.small{color:var(--muted);font-size:14px;line-height:1.6}.grid{display:grid;gap:14px}.form{display:grid;gap:12px}.field{display:grid;gap:6px}.field span{font-size:12px;color:var(--muted);font-weight:600}.field input,.field textarea,.field select{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;color:var(--text);outline:none}.field textarea{min-height:110px;resize:vertical}.matter-list{display:grid;gap:14px}.matter-card{display:grid;gap:10px}.matter-card.current{border-color:var(--soft)}.matter-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}.matter-title{font-size:18px;font-weight:700}.meta{display:grid;gap:6px;color:var(--muted);font-size:13px}.empty{padding:20px;border:1px dashed var(--line);border-radius:16px;color:var(--muted)}@media(min-width:980px){.grid{grid-template-columns:420px minmax(0,1fr)}}</style></head><body><header class='top'><div class='brand'><div class='mark'>Z</div><div><div class='name'>Zhuxin</div><div class='sub'>Matter hub</div></div></div><div class='row'><a class='btn' href='./index.html'>Main app</a><button class='btn' onclick='seedDemo()'>Load demo matters</button><button class='primary' onclick='focusForm()'>New matter</button></div></header><main class='shell'><section class='hero'><div class='badges'><span class='badge soft'>Backbone</span><span class='badge'>Matter system</span><span class='badge'>Shared state</span></div><h1 class='title'>Matter Hub</h1><div class='desc'>Create matters, choose the current matter, and keep one shared context for the rest of Zhuxin. The selected matter is saved to shared local state for the main shell.</div></section><section class='grid'><section class='card'><div class='row' style='justify-content:space-between;align-items:center'><h3 style='margin:0'>Create matter</h3><span id='currentChip' class='chip'>No current matter</span></div><div class='form' style='margin-top:12px'><label class='field'><span>Matter name</span><input id='matterName' placeholder='e.g. Acme v Delta — Patent Defense'></label><label class='field'><span>Client</span><input id='matterClient' placeholder='e.g. Acme Corp'></label><label class='field'><span>Project / deal</span><input id='matterProject' placeholder='e.g. Delta Litigation'></label><div class='row' style='gap:12px'><label class='field' style='flex:1'><span>Practice area</span><select id='matterArea'><option>Litigation</option><option>M&A</option><option>Commercial Contracts</option><option>Employment</option><option>Regulatory</option><option>Tax</option><option>General Advisory</option></select></label><label class='field' style='flex:1'><span>Jurisdiction</span><input id='matterJurisdiction' placeholder='e.g. UK / Delaware / Bangladesh'></label></div><label class='field'><span>Notes</span><textarea id='matterNotes' placeholder='Facts, posture, or special instructions...'></textarea></label><div class='row'><button class='primary' onclick='createMatter()'>Save matter</button><button class='btn' onclick='clearForm()'>Clear</button></div></div></section><section class='card'><div class='row' style='justify-content:space-between;align-items:center'><h3 style='margin:0'>All matters</h3><div class='row'><button class='btn' onclick='renderMatters()'>Refresh</button><button class='danger' onclick='clearAllMatters()'>Clear all</button></div></div><div id='matterList' class='matter-list' style='margin-top:14px'></div></section></section></main><script>const KEY='zhuxin_matter_state';function getState(){return JSON.parse(localStorage.getItem(KEY)||'{"currentId":null,"matters":[]}')}function setState(state){localStorage.setItem(KEY,JSON.stringify(state));window.dispatchEvent(new StorageEvent('storage',{key:KEY,newValue:JSON.stringify(state)}))}function focusForm(){document.getElementById('matterName').focus()}function clearForm(){['matterName','matterClient','matterProject','matterJurisdiction','matterNotes'].forEach(id=>document.getElementById(id).value='');document.getElementById('matterArea').value='Litigation'}function createMatter(){const name=document.getElementById('matterName').value.trim();if(!name){alert('Add a matter name first.');return}const state=getState();const matter={id:'m_'+Date.now(),name,client:document.getElementById('matterClient').value.trim()||'Unspecified client',project:document.getElementById('matterProject').value.trim()||'General project',area:document.getElementById('matterArea').value,jurisdiction:document.getElementById('matterJurisdiction').value.trim()||'Unspecified',notes:document.getElementById('matterNotes').value.trim(),createdAt:new Date().toISOString()};state.matters.unshift(matter);state.currentId=matter.id;setState(state);clearForm();renderMatters()}function selectMatter(id){const state=getState();state.currentId=id;setState(state);renderMatters()}function deleteMatter(id){const state=getState();state.matters=state.matters.filter(m=>m.id!==id);if(state.currentId===id)state.currentId=state.matters[0]?.id||null;setState(state);renderMatters()}function clearAllMatters(){if(!confirm('Clear all saved matters?'))return;setState({currentId:null,matters:[]});renderMatters()}function seedDemo(){const state=getState();if(state.matters.length){alert('Demo matters were not loaded because you already have saved matters.');return}state.matters=[{id:'m_demo_1',name:'Acme v Delta — Patent Defense',client:'Acme Corp',project:'Delta Litigation',area:'Litigation',jurisdiction:'US / UK',notes:'Initial complaint review and contradiction search.',createdAt:new Date().toISOString()},{id:'m_demo_2',name:'Northbridge — Supply Agreement Review',client:'Northbridge Holdings',project:'Commercial Contracts',area:'Commercial Contracts',jurisdiction:'England',notes:'Review change-of-control and assignment language.',createdAt:new Date().toISOString()},{id:'m_demo_3',name:'Avenor — Series B Financing',client:'Avenor AI',project:'Series B Financing',area:'M&A',jurisdiction:'Delaware',notes:'Draft closing checklist and timeline.',createdAt:new Date().toISOString()}];state.currentId='m_demo_1';setState(state);renderMatters()}function formatDate(value){try{return new Date(value).toLocaleString('en-GB')}catch{return value}}function renderHeader(state){const chip=document.getElementById('currentChip');const current=state.matters.find(m=>m.id===state.currentId);chip.textContent=current?('Current: '+current.name):'No current matter';chip.classList.toggle('active',!!current)}function renderMatters(){const state=getState();renderHeader(state);const box=document.getElementById('matterList');box.innerHTML='';if(!state.matters.length){box.innerHTML='<div class="empty">No matters yet. Create the first matter to start sharing context across Zhuxin.</div>';return}state.matters.forEach(m=>{const current=m.id===state.currentId;const card=document.createElement('div');card.className='matter-card'+(current?' current':'');card.innerHTML='<div class="matter-head"><div><div class="matter-title">'+escapeHtml(m.name)+'</div><div class="chips" style="margin-top:8px"><span class="chip'+(current?' active':'')+'">'+(current?'Current matter':'Saved matter')+'</span><span class="chip">'+escapeHtml(m.area)+'</span><span class="chip">'+escapeHtml(m.jurisdiction)+'</span></div></div><div class="row"><button class="btn" onclick="selectMatter(\''+m.id+'\')">'+(current?'Selected':'Make current')+'</button><button class="danger" onclick="deleteMatter(\''+m.id+'\')">Delete</button></div></div><div class="meta"><div><strong>Client:</strong> '+escapeHtml(m.client)+'</div><div><strong>Project:</strong> '+escapeHtml(m.project)+'</div><div><strong>Created:</strong> '+escapeHtml(formatDate(m.createdAt))+'</div>'+(m.notes?'<div><strong>Notes:</strong> '+escapeHtml(m.notes)+'</div>':'')+'</div>';box.appendChild(card)})}function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}renderMatters();window.addEventListener('storage',e=>{if(e.key===KEY)renderMatters()});</script></body></html>
